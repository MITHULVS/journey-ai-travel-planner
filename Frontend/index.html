<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey - AI-Powered Travel Planning</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Video Background -->
    <video autoplay muted loop class="video-bg">
        <source src="asset/videos/hero.mp4" type="video/mp4">
    </video>

    <!-- Dark Overlay -->
    <div class="overlay"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="hero-content">
            <h1 class="title">Journey</h1>
            <p class="subtitle">Plan your next adventure with AI-powered travel planning.</p>
        </div>

        <!-- Auth Buttons -->
        <div class="auth-buttons">
            <button class="btn btn-signup" id="signupBtn">Sign Up</button>
            <button class="btn btn-login" id="loginBtn">Login</button>
        </div>
    </div>

    <!-- Sign Up Modal -->
    <div class="modal" id="signupModal">
        <div class="modal-content">
            <button class="modal-close" id="signupClose">&times;</button>
            <h2>Sign Up</h2>
            <form id="signupForm">
                <input type="text" placeholder="Name" id="signupName" required>
                <input type="email" placeholder="Email" id="signupEmail" required>
                <input type="password" placeholder="Password" id="signupPassword" required>
                <button type="submit" class="btn-submit">Sign Up</button>
                <div class="message" id="signupMessage"></div>
            </form>
        </div>
        <div class="modal-backdrop" id="signupBackdrop"></div>
    </div>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <button class="modal-close" id="loginClose">&times;</button>
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" placeholder="Email" id="loginEmail" required>
                <input type="password" placeholder="Password" id="loginPassword" required>
                <button type="submit" class="btn-submit">Login</button>
                <div class="message" id="loginMessage"></div>
            </form>
        </div>
        <div class="modal-backdrop" id="loginBackdrop"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
